name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      # Temporary: deploy from the redesign branch until it's merged into main,
      # then this line can be removed.
      - claude/her-collective-redesign-agw8xq
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,README.md'
